<!DOCKTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homelab for workgroups</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <hw-window>
      <h1>Homelab for workgroups</h1>
      <menu>
        <li>File</li>
        <li>Edit</li>
      </menu>

      <hw-icongrid>
        <hw-icon>
          <img src="assets/terminal.png" alt="Terminal" />
          <span>Terminal</span>
        </hw-icon>
        <hw-icon>
          <img src="assets/file-explorer.png" alt="File Explorer" />
          <span>File Explorer</span>
        </hw-icon>
        <hw-icon>
          <img src="assets/settings.png" alt="Settings" />
          <span>Settings</span>
        </hw-icon>
      </hw-icongrid>

    </hw-window>
  </body>
</html>
