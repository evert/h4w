<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homelab for workgroups</title>
    <link rel="stylesheet" href="style.css" />

    <script async src="js/hw-window.js"></script>
  </head>
  <body>
    <hw-window class="main-window" title="Homelab for workgroups" src="data/home.json">
      <hw-icongrid>
        <hw-icon>
          <img src="image/icons/homelab/jellyfin.png" alt="Jellyfin" />
          <span>Jellyfin</span>
        </hw-icon>
        <hw-icon>
          <img src="image/icons/homelab/seerr.png" alt="Seerr" />
          <span>Seerr</span>
        </hw-icon>
        <hw-icon>
          <img src="image/icons/homelab/home-assistant.png" alt="Home Assistant" />
          <span>Home Assistant</span>
        </hw-icon>
        <hw-icon>
          <img src="image/icons/homelab/sonarr.png" alt="Sonarr" />
          <span>Sonarr</span>
        </hw-icon>
        <hw-icon>
          <img src="image/icons/homelab/radarr.png" alt="Radarr" />
          <span>Radarr</span>
        </hw-icon>
        <hw-icon>
          <img src="image/icons/homelab/deluge.png" alt="Deluge" />
          <span>Deluge</span>
        </hw-icon>
      </hw-icongrid>
    </hw-window>
  </body>
</html>
